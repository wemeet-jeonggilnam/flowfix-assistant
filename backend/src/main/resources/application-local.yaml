spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/flowfix
    username: flowfix
    password: flowfix
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    show-sql: true

logging:
  level:
    com.wemeet.flowfixassistant: DEBUG
    org.springframework.web: DEBUG

jwt:
  secret: flowfix-local-dev-secret-key-must-be-at-least-256-bits-long!!

rag-engine:
  base-url: http://localhost:8003
